<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Pause</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Orbitron', monospace;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        .vignette {
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
        }
        
        .scanlines {
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.1) 2px,
                rgba(0, 0, 0, 0.1) 4px
            );
            animation: scanMove 8s linear infinite;
        }
        
        @keyframes scanMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 100px; }
        }
        
        .center-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            pointer-events: none;
        }
        
        .pause-text {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 700;
            letter-spacing: 1.5em;
            text-indent: 1.5em;
            color: transparent;
            background: linear-gradient(135deg, #00f5ff, #ff00ff, #00f5ff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            animation: gradientShift 4s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(0, 245, 255, 0.3);
            opacity: 0.9;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .subtext {
            font-size: clamp(0.6rem, 1.2vw, 0.9rem);
            letter-spacing: 0.5em;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 2rem;
            animation: pulse 3s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        
        .corner {
            position: fixed;
            width: 60px;
            height: 60px;
            z-index: 15;
            opacity: 0.4;
        }
        
        .corner::before,
        .corner::after {
            content: '';
            position: absolute;
            background: linear-gradient(90deg, #00f5ff, transparent);
        }
        
        .corner-tl { top: 30px; left: 30px; }
        .corner-tl::before { width: 40px; height: 2px; top: 0; left: 0; }
        .corner-tl::after { width: 2px; height: 40px; top: 0; left: 0; }
        
        .corner-tr { top: 30px; right: 30px; }
        .corner-tr::before { width: 40px; height: 2px; top: 0; right: 0; background: linear-gradient(-90deg, #ff00ff, transparent); }
        .corner-tr::after { width: 2px; height: 40px; top: 0; right: 0; background: linear-gradient(180deg, #ff00ff, transparent); }
        
        .corner-bl { bottom: 30px; left: 30px; }
        .corner-bl::before { width: 40px; height: 2px; bottom: 0; left: 0; background: linear-gradient(90deg, #ff00ff, transparent); }
        .corner-bl::after { width: 2px; height: 40px; bottom: 0; left: 0; background: linear-gradient(0deg, #ff00ff, transparent); }
        
        .corner-br { bottom: 30px; right: 30px; }
        .corner-br::before { width: 40px; height: 2px; bottom: 0; right: 0; background: linear-gradient(-90deg, #00f5ff, transparent); }
        .corner-br::after { width: 2px; height: 40px; bottom: 0; right: 0; background: linear-gradient(0deg, #00f5ff, transparent); }
        
        .time {
            position: fixed;
            bottom: 40px;
            right: 50px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.3em;
            z-index: 20;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="overlay vignette"></div>
    <div class="overlay scanlines"></div>
    
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    
    <div class="center-text">
        <div class="pause-text">PAUSE</div>
        <div class="subtext">СКОРО ВЕРНУСЬ</div>
    </div>
    
    <div class="time" id="time"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        let connections = [];
        let time = 0;
        
        // Настройки
        const config = {
            particleCount: 80,
            connectionDistance: 200,
            particleSpeed: 0.3,
            colorCyan: { r: 0, g: 245, b: 255 },
            colorMagenta: { r: 255, g: 0, b: 255 },
            colorPurple: { r: 128, g: 0, b: 255 }
        };
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * config.particleSpeed;
                this.vy = (Math.random() - 0.5) * config.particleSpeed;
                this.radius = Math.random() * 2 + 1;
                this.colorType = Math.floor(Math.random() * 3);
                this.phase = Math.random() * Math.PI * 2;
                this.orbitRadius = Math.random() * 30 + 10;
                this.orbitSpeed = (Math.random() - 0.5) * 0.02;
            }
            
            update() {
                // Добавляем небольшое орбитальное движение
                const orbit = Math.sin(time * this.orbitSpeed + this.phase) * this.orbitRadius * 0.01;
                
                this.x += this.vx + orbit;
                this.y += this.vy + Math.cos(time * this.orbitSpeed + this.phase) * this.orbitRadius * 0.01;
                
                // Плавное возвращение на экран
                if (this.x < -50) this.x = width + 50;
                if (this.x > width + 50) this.x = -50;
                if (this.y < -50) this.y = height + 50;
                if (this.y > height + 50) this.y = -50;
            }
            
            getColor(alpha = 1) {
                const colors = [config.colorCyan, config.colorMagenta, config.colorPurple];
                const c = colors[this.colorType];
                return `rgba(${c.r}, ${c.g}, ${c.b}, ${alpha})`;
            }
            
            draw() {
                const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 4);
                glow.addColorStop(0, this.getColor(0.8));
                glow.addColorStop(0.5, this.getColor(0.2));
                glow.addColorStop(1, this.getColor(0));
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 4, 0, Math.PI * 2);
                ctx.fillStyle = glow;
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.getColor(1);
                ctx.fill();
            }
        }
        
        // Плавающие геометрические фигуры
        class FloatingShape {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 100 + 50;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.005;
                this.vx = (Math.random() - 0.5) * 0.2;
                this.vy = (Math.random() - 0.5) * 0.2;
                this.type = Math.floor(Math.random() * 4); // 0: треугольник, 1: квадрат, 2: шестиугольник, 3: круг
                this.colorType = Math.floor(Math.random() * 3);
                this.alpha = Math.random() * 0.1 + 0.03;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
                
                if (this.x < -this.size) this.x = width + this.size;
                if (this.x > width + this.size) this.x = -this.size;
                if (this.y < -this.size) this.y = height + this.size;
                if (this.y > height + this.size) this.y = -this.size;
            }
            
            getColor() {
                const colors = [config.colorCyan, config.colorMagenta, config.colorPurple];
                const c = colors[this.colorType];
                return `rgba(${c.r}, ${c.g}, ${c.b}, ${this.alpha})`;
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.strokeStyle = this.getColor();
                ctx.lineWidth = 1;
                
                ctx.beginPath();
                
                switch(this.type) {
                    case 0: // Треугольник
                        for (let i = 0; i < 3; i++) {
                            const angle = (i / 3) * Math.PI * 2 - Math.PI / 2;
                            const x = Math.cos(angle) * this.size;
                            const y = Math.sin(angle) * this.size;
                            if (i === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                        ctx.closePath();
                        break;
                    case 1: // Квадрат
                        ctx.rect(-this.size/2, -this.size/2, this.size, this.size);
                        break;
                    case 2: // Шестиугольник
                        for (let i = 0; i < 6; i++) {
                            const angle = (i / 6) * Math.PI * 2;
                            const x = Math.cos(angle) * this.size * 0.6;
                            const y = Math.sin(angle) * this.size * 0.6;
                            if (i === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                        ctx.closePath();
                        break;
                    case 3: // Круг
                        ctx.arc(0, 0, this.size * 0.5, 0, Math.PI * 2);
                        break;
                }
                
                ctx.stroke();
                ctx.restore();
            }
        }
        
        // Волны на фоне
        function drawWaves() {
            const waveCount = 5;
            
            for (let w = 0; w < waveCount; w++) {
                ctx.beginPath();
                
                const baseY = height * 0.3 + w * (height * 0.15);
                const amplitude = 30 + w * 10;
                const frequency = 0.003 - w * 0.0003;
                const speed = 0.0005 + w * 0.0002;
                
                ctx.moveTo(0, baseY);
                
                for (let x = 0; x <= width; x += 5) {
                    const y = baseY + 
                        Math.sin(x * frequency + time * speed) * amplitude +
                        Math.sin(x * frequency * 2 + time * speed * 1.5) * amplitude * 0.3;
                    ctx.lineTo(x, y);
                }
                
                const colors = [config.colorCyan, config.colorMagenta, config.colorPurple];
                const c = colors[w % 3];
                ctx.strokeStyle = `rgba(${c.r}, ${c.g}, ${c.b}, ${0.05 - w * 0.008})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
        
        // Инициализация
        let shapes = [];
        
        function init() {
            resize();
            particles = [];
            shapes = [];
            
            for (let i = 0; i < config.particleCount; i++) {
                particles.push(new Particle());
            }
            
            for (let i = 0; i < 8; i++) {
                shapes.push(new FloatingShape());
            }
        }
        
        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < config.connectionDistance) {
                        const alpha = (1 - distance / config.connectionDistance) * 0.3;
                        
                        const gradient = ctx.createLinearGradient(
                            particles[i].x, particles[i].y,
                            particles[j].x, particles[j].y
                        );
                        gradient.addColorStop(0, particles[i].getColor(alpha));
                        gradient.addColorStop(1, particles[j].getColor(alpha));
                        
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = gradient;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
        }
        
        function animate() {
            // Плавный градиентный фон
            const bgGradient = ctx.createRadialGradient(
                width / 2, height / 2, 0,
                width / 2, height / 2, Math.max(width, height)
            );
            bgGradient.addColorStop(0, '#0f0f1a');
            bgGradient.addColorStop(0.5, '#0a0a12');
            bgGradient.addColorStop(1, '#050508');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, width, height);
            
            // Рисуем волны
            drawWaves();
            
            // Обновляем и рисуем фигуры
            shapes.forEach(shape => {
                shape.update();
                shape.draw();
            });
            
            // Обновляем и рисуем соединения
            drawConnections();
            
            // Обновляем и рисуем частицы
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            time++;
            requestAnimationFrame(animate);
        }
        
        // Часы
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;
        }
        
        window.addEventListener('resize', () => {
            resize();
            // Перепозиционируем частицы
            particles.forEach(p => {
                if (p.x > width) p.x = Math.random() * width;
                if (p.y > height) p.y = Math.random() * height;
            });
        });
        
        init();
        animate();
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
